# One-hour angry-transform run on one RTX A6000.  Run a second seed on the
# second A6000 in parallel; do not shard one seed across GPUs.

model:
  device: cuda:0
  dtype: bfloat16
  attn_implementation: flash_attention_2
  layer: 15
  hidden_size: 1024
  steer_frame0_predictor: true

sampling:
  do_sample: true
  top_k: 50
  top_p: 1.0
  temperature: 0.9
  repetition_penalty: 1.05
  min_new_tokens: 2
  max_frames: 128
  language: English
  subtalker_temperature: 0.9
  subtalker_top_k: 50
  subtalker_top_p: 1.0

data:
  emotion: angry
  dataset_dir: data/prepared/angry
  contrasts_path: data/prepared/angry/contrasts-angry-train.pt
  bases_per_speaker: 5
  min_pair_emotion_prob: 0.2
  min_pair_speaker_sim: 0.85

train:
  # B=32 is the measured A6000 generation-throughput knee.  K=16/M=2 favors
  # contrast diversity while retaining two independent neutral bases.
  contrasts_per_update: 16
  bases_per_contrast: 2
  chunk_rows: 4
  min_row_survival: 0.8
  max_updates: 50
  max_attempts: 75
  # Reserve roughly ten minutes of the one-hour budget for final evaluation.
  max_wall_seconds: 3000
  eval_every: 10
  early_stop_patience: 4
  lr: 0.001
  weight_decay: 0.0001
  warmup_fraction: 0.05
  grad_clip: 1.0
  speaker_weight: 1.0
  alpha: 1.0
  rank: 16
  seed: 42
  reg_identity: 0.01
  reg_cosine: 0.01
  reg_norm: 0.01
  checkpoint_every: 5
  output_dir: runs/angry-1h-seed42

distributed:
  mode: none
  backend: nccl

asr:
  enabled: true
  model_id: openai/whisper-large-v3-turbo
  revision: 41f01f3fe87f28c78e2fbf8b568835947dd65ed9
  dtype: float16
  language: english
  task: transcribe
  loss_weight: 0.2
  max_wer_degradation: 0.06
  min_validation_reference_words: 100

eval:
  panel_seeds: 1
  alphas: [0.5, 0.73, 0.75, 1.0, 1.25]
  cadence_rows: 12
  # Keep validation at or below the empirically proven native-generation batch.
  generation_batch_rows: 32
  control_cache_dir: runs/control-cache-1h
  compute_wer: true
